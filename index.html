<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS - Serdam</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px}
.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:10px}
h1{text-align:center}
input,select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{background:black;color:white;font-weight:bold}
.success{margin-top:15px;padding:10px;background:#eaffea;border-radius:8px}
</style>
</head>

<body>

<div class="container">
  <h1>Donusaurus POS</h1>
  <p style="text-align:center">Sungai Raya Dalam (Serdam)</p>

  <input id="nama" placeholder="Nama Customer">
  
  <select id="metode">
    <option>Cash</option>
    <option>QRIS</option>
    <option>Transfer</option>
  </select>

  <input id="total" placeholder="Total (angka saja)">
  <input id="bayar" placeholder="Uang Bayar (Cash saja)">

  <button onclick="checkout()">Bayar</button>

  <div id="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzdTXyYEVCHzmTD7vi7_q_CaVl_OPBNFtVjEP-_HwpOVmiDE25pndvcVZdeXKKsFxE/exec";

const STRUK_URL = "https://donusaurus.github.io/struk_donosaurus_sungai_raya_dalam/";

function checkout(){
  let nama = document.getElementById("nama").value || "-";
  let metode = document.getElementById("metode").value;
  let total = Number(document.getElementById("total").value || 0);
  let bayar = Number(document.getElementById("bayar").value || 0);

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      metode:metode,
      total:total,
      bayar:bayar
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      let link = data.linkStruk;

      document.getElementById("result").innerHTML = `
        <div class="success">
          <b>Order Berhasil</b><br><br>
          ID: ${data.orderID}<br><br>
          <button onclick="window.open('${link}')">Lihat Struk</button>
        </div>
      `;
    }
  })
  .catch(err=>{
    alert("Error: "+err);
  });
}
</script>

</body>
</html>
