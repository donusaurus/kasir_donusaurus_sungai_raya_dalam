<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk Donusaurus</title>
</head>

<body>
<div style="font-family:monospace;padding:20px">Memuat struk...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzdTXyYEVCHzmTD7vi7_q_CaVl_OPBNFtVjEP-_HwpOVmiDE25pndvcVZdeXKKsFxE/exec";

window.addEventListener("load", loadReceipt);

function getParam(name){
  return new URL(window.location.href).searchParams.get(name);
}

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, "")) || 0;
}

function rp(n){
  return toNumber(n).toLocaleString("id-ID");
}

function orderNo(n){
  return String(n || "").replace(/[^\d]/g, "").padStart(3, "0");
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function safeSplit(v){
  return String(v || "").split(" | ");
}

function getQtyFromItem(item){
  let match = String(item || "").match(/^(\d+)x/i);
  return match ? Number(match[1]) : 1;
}

function shortItemName(item){
  return String(item || "")
    .replace("Box Donat (6 pcs)", "Box Donat (6 Pcs)")
    .replace("Pcs Donat", "Pcs Donat");
}

function parseAddOnLine(text){
  const line = String(text || "").trim();
  const match = line.match(/^(.*?)\s*=\s*Rp([\d.]+)$/i);
  if(!match){
    return { label: line, total: 0 };
  }
  return {
    label: match[1].trim(),
    total: toNumber(match[2])
  };
}

function renderDetailLines(text){
  return String(text || "")
    .split(", ")
    .map(x => x.trim())
    .filter(x => x && x !== "-")
    .map(x => `<div class="flavor">- ${escapeHtml(x)}</div>`)
    .join("");
}

async function loadReceipt(){
  let id = getParam("id");

  if(!id){
    document.body.innerHTML = "ID struk tidak ditemukan";
    return;
  }

  try{
    let res = await fetch(API_URL + "?id=" + encodeURIComponent(id));
    let data = await res.json();

    if(data.error){
      document.body.innerHTML = data.message || "Struk tidak ditemukan";
      return;
    }

    showReceipt(data);

  }catch(err){
    document.body.innerHTML = "Gagal memuat struk: " + err.message;
  }
}

function showReceipt(data){
  let items = safeSplit(data.item);
  let rasa = safeSplit(data.rasa);
  let harga = safeSplit(data.harga);
  let rows = "";
  let addOnRows = "";
  let addOns = safeSplit(data.addOn).filter(x => x && x !== "-");

  items.forEach((it, i) => {
    if(!it || it === "-") return;

    let lineTotal = toNumber(harga[i] || data.total);
    let qty = getQtyFromItem(it);
    let hargaSatuan = qty > 0 ? lineTotal / qty : lineTotal;

    rows += `
      <div class="item-line">
        <span>${escapeHtml(shortItemName(it))} @Rp${rp(hargaSatuan)}</span>
        <b>Rp${rp(lineTotal)}</b>
      </div>
    `;

    rows += renderDetailLines(rasa[i]);
    rows += `<div class="item-gap"></div>`;
  });

  if(addOns.length){
    addOnRows += `<hr><div class="section"><div class="section-title">Add On</div>`;
    addOns.forEach(line => {
      const item = parseAddOnLine(line);
      addOnRows += `
        <div class="item-line">
          <span>${escapeHtml(item.label)}</span>
          <b>${item.total ? "Rp" + rp(item.total) : ""}</b>
        </div>
      `;
    });
    addOnRows += `</div>`;
  }

  document.body.innerHTML = `
    <style>
      body{
        font-family:monospace;
        font-size:10px;
        padding:10px;
      }

      .center{text-align:center}
      .item-line{
        display:flex;
        justify-content:space-between;
      }
      .item-gap{height:6px}
      hr{border:0;border-top:1px dashed #000;margin:6px 0}
    </style>

    <div class="center">
      Donusaurus<br>
      Sungai Raya Dalam (Serdam)<br>
      Komplek Permata Khatulistiwa<br>
      Blok Melati No. 9
    </div>

    <hr>

    <div>
      Order ID: #${orderNo(data.orderID)} / ${escapeHtml(data.kodeUnik)}<br>
      Customer: ${escapeHtml(data.nama || "-")} (${escapeHtml(data.sumber || "-")})<br>
      ${escapeHtml(data.tanggal)}, ${escapeHtml(data.jam)}
    </div>

    <hr>

    ${rows || "-"}

    ${addOnRows}

    <hr>

    <div class="item-line">
      <span>Total</span>
      <b>Rp${rp(data.total)}</b>
    </div>

    <div>Metode: ${escapeHtml(data.metode)}</div>

    ${String(data.metode) === "Cash" ? `
      <div class="item-line">
        <span>Bayar</span>
        <span>Rp${rp(data.bayar)}</span>
      </div>
      <div class="item-line">
        <span>Kembali</span>
        <span>Rp${rp(data.kembalian)}</span>
      </div>
    ` : ""}

    <hr>

    <div class="center">
      Terima kasih 🙏<br>
      Follow @donusaurus
    </div>
  `;
}
</script>

</body>
</html>
